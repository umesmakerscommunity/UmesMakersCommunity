<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gestionar herramientas | UMES Makers Community</title>
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
    <link rel="stylesheet" href="/admin/admin.css" />
  </head>
  <body class="admin-body" data-admin-page="tools">
    <header class="admin-header">
      <nav class="admin-nav container" aria-label="Navegacion admin">
        <a class="admin-brand" href="/admin/dashboard.html">
          <img src="/logo.png" alt="Logo de UMES Makers Community" />
          <span>Admin UMES Makers</span>
        </a>
        <div class="admin-nav-actions">
          <a href="/admin/dashboard.html">Dashboard</a>
          <a href="/">Ver sitio</a>
          <button type="button" data-logout>Cerrar sesion</button>
        </div>
      </nav>
    </header>

    <main class="admin-main container">
      <section class="admin-page-heading">
        <span class="section-kicker">Herramientas</span>
        <h1>Gestionar herramientas</h1>
        <p>Actualiza inventario, disponibilidad y uso recomendado.</p>
        <p class="admin-user" data-admin-user></p>
      </section>

      <section class="admin-events-layout">
        <form class="admin-form admin-event-form" data-content-form>
          <div class="admin-form-heading">
            <h2 data-content-form-title>Nueva herramienta</h2>
            <button class="mini-link" type="button" data-content-cancel hidden>Cancelar edicion</button>
          </div>
          <input type="hidden" name="id" />
          <label>
            Nombre
            <input type="text" name="name" required />
          </label>
          <label>
            Categoria
            <input type="text" name="category" />
          </label>
          <label>
            Disponibilidad
            <input type="text" name="availability" />
          </label>
          <label>
            Cantidad
            <input type="number" name="quantity" value="0" />
          </label>
          <label class="admin-full">
            Uso recomendado
            <textarea name="recommended_use" rows="4"></textarea>
          </label>
          <label>
            Orden
            <input type="number" name="sort_order" value="0" />
          </label>
          <label class="admin-checkbox">
            <input type="checkbox" name="is_published" checked />
            Publicar herramienta
          </label>
          <button class="btn btn-primary admin-full" type="submit">Guardar herramienta</button>
          <p class="admin-message admin-full" data-admin-message hidden></p>
        </form>

        <section class="admin-list-panel">
          <div class="admin-list-heading">
            <h2>Herramientas existentes</h2>
            <button class="mini-link" type="button" data-content-refresh>Actualizar</button>
          </div>
          <div class="admin-loading" data-content-loading hidden>Cargando herramientas...</div>
          <div class="admin-events-list" data-content-list></div>
        </section>
      </section>
    </main>

    <script type="module" src="/admin/admin.js"></script>
  </body>
</html>
