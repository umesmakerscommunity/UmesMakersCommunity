<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Solicitudes de miembros | UMES Makers Community</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
    <link rel="stylesheet" href="/admin/admin.css" />
  </head>
  <body class="admin-body" data-admin-page="registrations">
    <header class="admin-header">
      <nav class="admin-nav container" aria-label="Navegacion admin">
        <a class="admin-brand" href="/admin/dashboard.html">
          <img src="/logo.png" alt="Logo de UMES Makers Community" />
          <span>Admin UMES Makers</span>
        </a>
        <div class="admin-nav-actions">
          <a href="/admin/dashboard.html">Dashboard</a>
          <a href="/">Ver sitio</a>
          <button type="button" data-logout>Cerrar sesion</button>
        </div>
      </nav>
    </header>

    <main class="admin-main container">
      <section class="admin-page-heading">
        <span class="section-kicker">Solicitudes</span>
        <h1>Solicitudes de miembros</h1>
        <p>Revisa los registros enviados desde el formulario publico de contacto.</p>
        <p class="admin-user" data-admin-user></p>
      </section>

      <section class="admin-list-panel admin-registrations-panel">
        <div class="admin-list-heading">
          <h2>Registros recibidos</h2>
          <button class="mini-link" type="button" data-refresh-registrations>Actualizar</button>
        </div>
        <p class="admin-message" data-admin-message hidden></p>
        <div class="admin-loading" data-registrations-loading hidden>Cargando solicitudes...</div>
        <div class="admin-registrations-list" data-registrations-list></div>
      </section>
    </main>

    <script type="module" src="/admin/admin.js"></script>
  </body>
</html>
